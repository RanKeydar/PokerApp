<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>התחברות</title>
  <style>
    body { direction: rtl; text-align: right; font-family: Arial, sans-serif; margin: 20px; }
    form { max-width: 320px; margin-top: 20px; }
    label { display:block; margin: 10px 0 5px; }
    input, button { width: 100%; padding: 8px; }
    .err { color: darkred; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>התחברות</h1>

  <form method="POST">
    <label>שם משתמש</label>
    <input name="username" required>

    <label>סיסמה</label>
    <input name="password" type="password" required>

    <button type="submit">כניסה</button>

    {% if error %}
      <div class="err">{{ error }}</div>
    {% endif %}
  </form>

  <p style="margin-top:14px;">
  <a href="{{ url_for('auth.signup') }}">אין לך משתמש? שלח בקשת הרשמה</a>
</p>

</body>
</html>
