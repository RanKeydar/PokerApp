<!doctype html>
<html lang="he" dir="rtl">
<head>
    <meta charset="utf-8">
    <title>שחקנים</title>
    <style>
        body {
            direction: rtl;
            text-align: right;
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            max-width: 500px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 8px 10px;
        }
        th {
            background-color: #f0f0f0;
        }
        a {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <h1>שחקנים</h1>

    <p>
        <a href="{{ url_for('main.add_player') }}">➕ הוסף שחקן חדש</a>
        <a href="{{ url_for('main.games_list') }}">← חזרה למשחקים</a>
    </p>

    {% if players and players|length > 0 %}
        <table>
            <thead>
                <tr>
                    <th>שם שחקן</th>
                </tr>
            </thead>
            <tbody>
                {% for p in players %}
                    <tr>
                        <td>{{ p["name"] }}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    {% else %}
        <p>עדיין אין שחקנים.</p>
    {% endif %}
</body>
</html>
