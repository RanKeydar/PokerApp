{% extends "base.html" %}
{% block title %}כותרת הדף{% endblock %}
{% block content %}
{% block subtitle %}{% endblock %}

  <h1>הרשמה</h1>

  <form method="POST">
    <label>שם משתמש</label>
    <input name="username" required>

    <label>סיסמה</label>
    <input name="password" type="password" required>

    <label>מבקש תפקיד</label>
    <select name="requested_role">
      <option value="player">שחקן (צפייה בלבד)</option>
      <option value="magician">קוסם (עריכת תוצאות)</option>
    </select>

    <button type="submit">שלח בקשה</button>

    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    {% if success %}<div class="ok">{{ success }}</div>{% endif %}
  </form>

  <p style="margin-top:14px;">
    <a href="{{ url_for('auth.login') }}">כבר יש לך משתמש? התחבר</a>
  </p>

  {% endblock %}
