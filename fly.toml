# fly.toml app configuration file generated for pokerapp-jbeynw on 2025-12-31T21:21:27Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pokerapp-jbeynw'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 10000
  force_https = true
  auto_stop_machines = "off"
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[mounts]
  source = "poker_data_ams"
  destination = "/data"