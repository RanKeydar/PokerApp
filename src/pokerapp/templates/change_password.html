{% extends "base.html" %}
{% block title %}פנקס הקטן | שינוי סיסמה{% endblock %}

{% block content %}
<section class="auth-card">

  <h1 class="page-title">שינוי סיסמה</h1>

  {% if error %}
  <div class="flash flash-error" role="alert">{{ error }}</div>
  {% endif %}

  {% if success %}
  <div class="flash flash-success" role="alert">{{ success }}</div>
  {% endif %}

  {% if not success %}
  <form method="POST" class="app-form auth-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="form-row">
      <label for="old_password">סיסמה נוכחית</label>
      <input id="old_password" name="old_password" type="password"
             autocomplete="current-password" required>
    </div>

    <div class="form-row">
      <label for="new_password">סיסמה חדשה</label>
      <input id="new_password" name="new_password" type="password"
             autocomplete="new-password" minlength="6" required>
      <small class="form-hint">לפחות 6 תווים</small>
    </div>

    <div class="form-row">
      <label for="confirm_password">אימות סיסמה חדשה</label>
      <input id="confirm_password" name="confirm_password" type="password"
             autocomplete="new-password" required>
    </div>

    <button type="submit" class="btn primary">עדכן סיסמה</button>
  </form>
  {% else %}
  <p class="auth-alt">
    <a href="{{ url_for('main.home') }}">חזרה לדף הבית</a>
  </p>
  {% endif %}

  <p class="auth-alt" style="margin-top:12px;">
    <a href="{{ url_for('main.home') }}">ביטול</a>
  </p>

</section>
{% endblock %}
