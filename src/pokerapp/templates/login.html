{% extends "base.html" %}
{% block title %}פנקס הקטן | התחברות{% endblock %}

{% block content %}
<section class="auth-card">

  <div style="text-align:center;margin-bottom:18px;">
    <img src="{{ url_for('static', filename='icons/icon-512.png') }}"
         alt="פנקס הקטן" width="56" height="56"
         style="border-radius:14px;box-shadow:0 4px 12px rgba(0,0,0,.15);">
    <div style="font-size:13px;font-weight:700;color:#0f766e;margin-top:6px;letter-spacing:.03em;">
      פנקס הקטן
    </div>
  </div>

  <h1 class="page-title">התחברות</h1>

  {% if error %}
  <div class="flash flash-error" role="alert">{{ error }}</div>
  {% endif %}

  <form method="POST" class="app-form auth-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-row">
      <label for="username">שם משתמש</label>
      <input id="username" name="username" type="text" autocomplete="username" required>
    </div>
    <div class="form-row">
      <label for="password">סיסמה</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn primary">כניסה</button>
  </form>

  <p class="auth-alt">
    <a href="{{ url_for('auth.signup') }}">אין לך משתמש? שלח בקשת הרשמה</a>
  </p>

</section>
{% endblock %}
