{% extends "base.html" %}
{% block title %}התחברות{% endblock %}
{% block subtitle %}כניסה למערכת{% endblock %}

{% block content %}
<section class="auth-card">
  <h1 class="page-title">התחברות</h1>

  {% if error %}
  <div class="flash flash-error" role="alert">{{ error }}</div>
  {% endif %}

  <form method="POST" class="app-form auth-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-row">
      <label for="username">שם משתמש</label>
      <input id="username" name="username" type="text" autocomplete="username" required>
    </div>

    <div class="form-row">
      <label for="password">סיסמה</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
    </div>

    <button type="submit" class="btn primary">כניסה</button>
  </form>

  <p class="auth-alt">
    <a href="{{ url_for('auth.signup') }}">אין לך משתמש? שלח בקשת הרשמה</a>
  </p>
</section>
{% endblock %}
